[pytest]
# Pytest configuration for NanoBot Factory

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests (need DB)
    e2e: End-to-end tests
    slow: Slow running tests (>1s)
    asyncio: Async tests
    timeout: pytest-timeout marker (pytest-timeout or asyncio.wait_for fallback)
