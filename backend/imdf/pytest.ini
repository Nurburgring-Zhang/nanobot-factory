[pytest]
testpaths = tests
timeout = 30
addopts = -v --tb=short --color=yes
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    label_offline_required: P22-P1d / R2 N10 — label-skill test that must run with LABEL_OFFLINE=1
