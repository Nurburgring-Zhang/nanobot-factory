# ============================================================================
# IMDF Nginx Reverse Proxy Configuration
# ============================================================================
# Place at: /etc/nginx/sites-available/imdf
# Enable with: ln -s /etc/nginx/sites-available/imdf /etc/nginx/sites-enabled/
# Test with:   nginx -t && systemctl reload nginx
# ============================================================================

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$server_name$request_uri;
}

# ── HTTPS server ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL certificates (certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Gzip Compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/csv
        application/json
        application/javascript
        application/xml
        application/x-javascript
        application/xhtml+xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ── Proxy Cache (for API responses) ────────────────────────────────────
    proxy_cache_path /var/cache/nginx/imdf levels=1:2 keys_zone=imdf_cache:50m
                     max_size=500m inactive=60m use_temp_path=off;

    proxy_cache_key "$scheme$request_method$host$request_uri";

    # ── Static files (served directly by nginx, bypassing backend) ─────────
    location /css/ {
        root /mnt/d/Hermes/infinite-multimodal-data-foundry/frontend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location /js/ {
        root /mnt/d/Hermes/infinite-multimodal-data-foundry/frontend;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location /static/ {
        root /mnt/d/Hermes/infinite-multimodal-data-foundry/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── API caching (short-lived for live data) ────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_buffering on;

        # Cache successful GET responses for 10s
        proxy_cache imdf_cache;
        proxy_cache_valid 200 10s;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $http_cache_control;
        proxy_no_cache $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Main proxy (all other requests) ────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_buffering on;

        # Cache successful GET responses for 30s
        proxy_cache imdf_cache;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $http_cache_control;
        proxy_no_cache $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── File upload limit ──────────────────────────────────────────────────
    client_max_body_size 500M;

    # ── Deny access to hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
