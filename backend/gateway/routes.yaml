# =====================================================================
# Nanobot Factory API Gateway — route configuration
# =====================================================================
# Each entry maps a public prefix (what the client sees) to a downstream
# service URL (where the gateway forwards the request).
#
# Auth rules:
#   - require_auth: true  →  request MUST carry a valid JWT
#   - require_auth: false →  public route (login, register, healthz, ...)
#
# The upstream URL is the HOST + INTERNAL prefix only; the gateway
# appends the original request path verbatim, so the monolith's
# /internal/* strip-middleware can re-derive the real route.
#
# Rate limit: applied PER CLIENT IP via the token-bucket middleware.
# Circuit breaker: applied PER SERVICE.
# =====================================================================

gateway:
  host: "0.0.0.0"
  port: 8000
  upstream_timeout_seconds: 30
  rate_limit:
    capacity: 100          # max burst tokens per IP
    refill_per_second: 50  # steady-state allowance per IP
  circuit_breaker:
    failure_threshold: 5   # consecutive failures before opening
    reset_timeout_seconds: 30

# ---------------------------------------------------------------------
# 12 microservice routes
# All upstream URLs point to the monolith's /internal namespace
# (canvas_web.py strips the /internal prefix and routes the rest).
# ---------------------------------------------------------------------
