{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nanobot-factory.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name | default (include "nanobot-factory.fullname" .) }}
  labels:
    {{- include "nanobot-factory.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default false }}
---
# Minimal Role to read our own ConfigMap
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nanobot-factory.fullname" . }}-config-reader
  namespace: {{ .Values.namespace.name | default (include "nanobot-factory.fullname" .) }}
  labels:
    {{- include "nanobot-factory.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
      - {{ include "nanobot-factory.fullname" . }}-config
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nanobot-factory.fullname" . }}-config-reader
  namespace: {{ .Values.namespace.name | default (include "nanobot-factory.fullname" .) }}
  labels:
    {{- include "nanobot-factory.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "nanobot-factory.serviceAccountName" . }}
    namespace: {{ .Values.namespace.name | default (include "nanobot-factory.fullname" .) }}
roleRef:
  kind: Role
  name: {{ include "nanobot-factory.fullname" . }}-config-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}