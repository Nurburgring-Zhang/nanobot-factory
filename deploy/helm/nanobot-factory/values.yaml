# =====================================================================
# nanobot-factory — Helm values
# Override anything via -f my-values.yaml or --set key=value
# =====================================================================

# ---------------------------------------------------------------------
# Global image settings
# ---------------------------------------------------------------------
image:
  repository: nanobot-factory
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------
# Image pull secrets (only needed for private registries)
# ---------------------------------------------------------------------
imagePullSecrets: []
# - name: regcred

# ---------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------
replicaCount: 2

podAnnotations:
  config-checksum: "v1"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# ---------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------
service:
  type: ClusterIP
  httpPort: 80
  backendPort: 8001
  annotations: {}

# ---------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-cookie-name: "nanobot-route"
  hosts:
    - host: nanobot.example.com
      paths:
        - path: /
          pathType: Prefix
    - host: api.nanobot.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - nanobot.example.com
        - api.nanobot.example.com
      secretName: nanobot-factory-tls

# ---------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------
resources:
  requests:
    cpu: 250m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: 2000m
    memory: 4Gi
    ephemeral-storage: 2Gi

# ---------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------
startupProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# ---------------------------------------------------------------------
# Autoscaling
# ---------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

# ---------------------------------------------------------------------
# PodDisruptionBudget
# ---------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ---------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------
serviceAccount:
  create: true
  automountToken: false
  name: nanobot-factory

# ---------------------------------------------------------------------
# Application configuration (injected as env vars)
# ---------------------------------------------------------------------
config:
  nanobotHost: "0.0.0.0"
  nanobotPort: "8001"
  uvicornWorkers: "2"
  logLevel: "INFO"
  allowedOrigins: "https://nanobot.example.com"
  corsAllowAll: "false"
  rateLimitRequests: "200"
  rateLimitWindow: "60"
  imdfDataDir: "/app/data"
  imdfLogsDir: "/app/logs"
  databasePath: "/app/data/nanobot.db"
  devMode: "false"
  enableRobustnessMiddleware: "true"
  maxConcurrentRequests: "100"
  requestTimeoutSeconds: "30"
  maxBodySizeMb: "64"

# ---------------------------------------------------------------------
# Secrets (override with --set or external secret manager)
# ---------------------------------------------------------------------
# NOTE: never commit real secrets. Use sealed-secrets / external-secrets / SOPS.
existingSecretName: ""
secrets: {}
# jwtSecret: "change-me"
# deepseekApiKey: "your-key"

# ---------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------
persistence:
  data:
    enabled: true
    size: 50Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  logs:
    enabled: true
    size: 20Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

# ---------------------------------------------------------------------
# Topology / scheduling
# ---------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------
# Pod-level extras
# ---------------------------------------------------------------------
priorityClassName: ""
terminationGracePeriodSeconds: 30