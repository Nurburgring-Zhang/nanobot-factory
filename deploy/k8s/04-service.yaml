# =====================================================================
# 04-service.yaml
# Service exposing the pod's HTTP port.
# ClusterIP by default — Ingress (05-ingress.yaml) handles external traffic.
# 1 resource: Service.
# =====================================================================
apiVersion: v1
kind: Service
metadata:
  name: nanobot-factory
  namespace: nanobot-factory
  labels:
    app.kubernetes.io/name: nanobot-factory
    app.kubernetes.io/component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nanobot-factory
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: http        # 8080 (nginx) inside the container
      protocol: TCP
      appProtocol: http
    - name: backend
      port: 8001
      targetPort: backend     # 8001 (uvicorn) — internal pod-to-pod / debugging
      protocol: TCP
      appProtocol: http
  sessionAffinity: None
  publishNotReadyAddresses: false