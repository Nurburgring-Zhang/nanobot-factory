# =====================================================================
# 06-hpa.yaml
# Horizontal Pod Autoscaler — scales on CPU + memory + a custom metric
# (active WebSocket connections, scraped from /metrics).
# 1 resource: HorizontalPodAutoscaler.
# =====================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nanobot-factory
  namespace: nanobot-factory
  labels:
    app.kubernetes.io/name: nanobot-factory
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nanobot-factory
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300    # don't scale down too quickly
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
    - type: Pods
      pods:
        metric:
          name: nanobot_active_ws_connections
        target:
          type: AverageValue
          averageValue: "200"