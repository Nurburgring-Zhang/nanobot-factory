# =====================================================================
# 05-ingress.yaml
# External Ingress: TLS via cert-manager + nginx ingress controller.
# 1 resource: Ingress.
# =====================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nanobot-factory
  namespace: nanobot-factory
  labels:
    app.kubernetes.io/name: nanobot-factory
    app.kubernetes.io/component: backend
  annotations:
    # nginx-ingress specific
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout"
    # session affinity for sticky clients (canvas WebSocket)
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/affinity-cookie-name: "nanobot-route"
    nginx.ingress.kubernetes.io/affinity-cookie-expires: "86400"
    # CORS (mirrors backend defaults)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # security headers
    nginx.ingress.kubernetes.io/server-snippet: |
      more_set_headers "X-Content-Type-Options nosniff";
      more_set_headers "X-Frame-Options SAMEORIGIN";
      more_set_headers "Referrer-Policy strict-origin-when-cross-origin";
    # cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # external-dns
    external-dns.alpha.kubernetes.io/hostname: "nanobot.example.com"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nanobot.example.com
        - api.nanobot.example.com
      secretName: nanobot-factory-tls
  rules:
    - host: nanobot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nanobot-factory
                port:
                  number: 80
    - host: api.nanobot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nanobot-factory
                port:
                  number: 80