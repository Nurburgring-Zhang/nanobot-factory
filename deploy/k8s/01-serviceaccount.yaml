# =====================================================================
# 01-serviceaccount.yaml
# ServiceAccount for the nanobot-factory pods, plus a minimal Role that
# grants read access to its own ConfigMap (so the app can hot-reload config).
# 3 resources: ServiceAccount, Role, RoleBinding.
# =====================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nanobot-factory
  namespace: nanobot-factory
  labels:
    app.kubernetes.io/name: nanobot-factory
    app.kubernetes.io/component: backend
automountServiceAccountToken: false   # we don't need the API token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nanobot-factory-config-reader
  namespace: nanobot-factory
  labels:
    app.kubernetes.io/name: nanobot-factory
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["nanobot-factory-config"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nanobot-factory-config-reader
  namespace: nanobot-factory
  labels:
    app.kubernetes.io/name: nanobot-factory
subjects:
  - kind: ServiceAccount
    name: nanobot-factory
    namespace: nanobot-factory
roleRef:
  kind: Role
  name: nanobot-factory-config-reader
  apiGroup: rbac.authorization.k8s.io