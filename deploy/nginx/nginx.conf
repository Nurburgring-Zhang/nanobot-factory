# =====================================================================
# nginx config for nanobot-factory runtime image
# - Serves the Vue 3 frontend SPA on /
# - Reverse-proxies /api, /airi, /omni, /canvas, /health, /metrics → uvicorn
# - Hides CORS, security headers, gzip
# =====================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 64m;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm;

    # ---- backend upstream ----
    upstream nanobot_backend {
        server 127.0.0.1:8001;
        keepalive 16;
    }

    # ---- security headers (applied to all responses) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ---- health endpoints (for k8s probes & docker HEALTHCHECK) ----
        location = /healthz {
            proxy_pass http://nanobot_backend/healthz;
            proxy_set_header Host $host;
            access_log off;
        }
        location = /readyz {
            proxy_pass http://nanobot_backend/readyz;
            proxy_set_header Host $host;
            access_log off;
        }

        # ---- backend API routes ----
        location /api/ {
            proxy_pass http://nanobot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
        location /airi/ {
            proxy_pass http://nanobot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
        location /omni/ {
            proxy_pass http://nanobot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;   # ComfyUI long renders
        }
        location /canvas/ {
            proxy_pass http://nanobot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # ---- WebSocket (canvas realtime push) ----
        location /ws/ {
            proxy_pass http://nanobot_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;   # long-lived
        }

        # ---- SPA fallback: serve index.html for unknown paths (no extension) ----
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---- static asset caching ----
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }
    }
}