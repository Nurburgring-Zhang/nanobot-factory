# ============================================================================
# pg_hba.conf — IMDF client authentication
# ----------------------------------------------------------------------------
# Loopback only (postgresql.conf binds to 127.0.0.1). The imdf_app role can
# connect via TCP from the same host for dev tools (psql, pgAdmin, pg_dump
# from cron) and from the LAN range for ops dashboards.
# ============================================================================

# ── Local Unix socket (postgres superuser only) ──────────────────────────
local   all             postgres                                peer
local   all             all                                     peer

# ── IPv4 loopback (all users) ────────────────────────────────────────────
host    all             all             127.0.0.1/32            scram-sha-256

# ── LAN range (ops jump host + monitoring) ───────────────────────────────
host    all             imdf_app        10.0.0.0/8              scram-sha-256
host    all             imdf_app        172.16.0.0/12           scram-sha-256
host    all             imdf_app        192.168.0.0/16          scram-sha-256

# ── Replication (read replicas, restrict to replica network) ─────────────
host    replication     replicator      10.0.0.0/8              scram-sha-256

# ── Reject everything else ──────────────────────────────────────────────
host    all             all             0.0.0.0/0               reject