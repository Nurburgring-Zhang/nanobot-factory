# ============================================================================
# redis.conf — IMDF tuned for 64 GB
# ----------------------------------------------------------------------------
# Three logical DBs:
#   0 → app cache (REDIS_URL)
#   1 → Celery broker (CELERY_BROKER_URL)
#   2 → Celery results (CELERY_RESULT_BACKEND)
# ============================================================================

# ── Network ─────────────────────────────────────────────────────────────
bind 127.0.0.1 -::1
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── General ─────────────────────────────────────────────────────────────
daemonize yes
supervised systemd
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log
databases 16
always-show-logo no
set-proc-title yes
proc-title-template "{title} {listen-addr} {server-mode}"

# ── RDB persistence (Celery result backend durability) ──────────────────
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/redis

# ── AOF (broker durability across restarts) ────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 256mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ── Memory ──────────────────────────────────────────────────────────────
maxmemory 8gb
maxmemory-policy allkeys-lru
maxmemory-samples 5
replica-ignore-maxmemory yes

# ── Lazy freeing ────────────────────────────────────────────────────────
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# ── Slow log ────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Latency monitoring ─────────────────────────────────────────────────
latency-monitor-threshold 100

# ── Threading (Redis 6+) ────────────────────────────────────────────────
io-threads 4
io-threads-do-reads yes