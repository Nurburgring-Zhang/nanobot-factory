# ============================================================================
# nginx-imdf.conf — IMDF public reverse proxy + static frontend
# ----------------------------------------------------------------------------
# Listens 80/443 on imdf.example.com. All backend traffic routes through
# imdf-gateway :8000; static assets are served from frontend-v2/dist.
# ============================================================================

# ── Rate limit zones ────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=120r/m;
limit_req_zone $binary_remote_addr zone=up_zone:10m    rate=20r/m;       # uploads

# ── Upstream gateway ────────────────────────────────────────────────────
upstream imdf_gateway {
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ── WebSocket / SSE upgrade map ──────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name imdf.example.com;

    # Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name imdf.example.com;

    ssl_certificate     /etc/letsencrypt/live/imdf.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imdf.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"               always;
    add_header X-Content-Type-Options     "nosniff"                  always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy    "default-src 'self' https:; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: wss:; font-src 'self' data:;" always;

    client_max_body_size 1G;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout 300s;
    client_header_timeout 60s;
    send_timeout 300s;

    access_log /var/log/nginx/imdf-access.log;
    error_log  /var/log/nginx/imdf-error.log warn;

    # ── Health (no auth, no rate limit) ────────────────────────────────
    location = /healthz {
        access_log off;
        proxy_pass http://imdf_gateway;
        proxy_set_header Host $host;
    }

    # ── Auth endpoints (tight rate limit) ──────────────────────────────
    location ~ ^/api/(auth|login|register|password)/ {
        limit_req zone=auth_zone burst=20 nodelay;
        proxy_pass http://imdf_gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Upload endpoints ───────────────────────────────────────────────
    location ~ ^/api/assets/(upload|presign|batch) {
        limit_req zone=up_zone burst=10 nodelay;
        proxy_pass http://imdf_gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket (canvas editor + agent streaming) ────────────────────
    location /api/ws/ {
        proxy_pass http://imdf_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── Metrics (only via internal IP) ─────────────────────────────────
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://imdf_gateway;
    }

    # ── Standard API ───────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=200 nodelay;
        proxy_pass http://imdf_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }

    # ── MinIO console (internal-only, optional) ────────────────────────
    location /minio/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:9001/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static frontend (Vue SPA) ──────────────────────────────────────
    location /assets/ {
        alias /opt/nanobot-factory/frontend-v2/dist/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        root /opt/nanobot-factory/frontend-v2/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Custom error pages ─────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}