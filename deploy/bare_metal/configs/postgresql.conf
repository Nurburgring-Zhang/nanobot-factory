# ============================================================================
# postgresql.conf — IMDF tuned for 64 GB / 16 cores (PostgreSQL 15)
# ----------------------------------------------------------------------------
# Drop into /etc/postgresql/15/main/postgresql.conf and restart postgresql.
# Connection budget: 12 services × 4 workers ≈ 48 + celery 4 + admin = 60.
# Memory math:
#   shared_buffers  = 16 GB  (~25% RAM)
#   effective_cache = 48 GB  (~75% RAM)
#   work_mem        = 64 MB  (64 connections × 64 MB = 4 GB headroom)
#   wal_buffers     = 64 MB
# ============================================================================

# ── Connection & authentication ─────────────────────────────────────────
listen_addresses = '127.0.0.1'              # loopback only; nginx/edge handles public
port = 5432
max_connections = 200
superuser_reserved_connections = 5
unix_socket_directories = '/var/run/postgresql'

# ── Memory ───────────────────────────────────────────────────────────────
shared_buffers = 16GB
effective_cache_size = 48GB
work_mem = 64MB
maintenance_work_mem = 2GB
huge_pages = try
temp_buffers = 16MB

# ── WAL ─────────────────────────────────────────────────────────────────
wal_level = replica
wal_buffers = 64MB
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
archive_mode = on
archive_command = 'test ! -f /var/backups/imdf/wal/%f && cp %p /var/backups/imdf/wal/%f'

# ── Query planner ────────────────────────────────────────────────────────
random_page_cost = 1.1                    # SSD
effective_io_concurrency = 200           # SSD concurrent reads
max_worker_processes = 16
max_parallel_workers = 12
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# ── Logging ─────────────────────────────────────────────────────────────
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on
log_min_duration_statement = 500ms        # slow query log threshold
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB
log_autovacuum_min_duration = 0
log_line_prefix = '%t [%p]: db=%d,user=%u,app=%a '

# ── Autovacuum (heavy write workload) ────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025

# ── Replication (read replicas, off by default) ──────────────────────────
max_replication_slots = 10
max_wal_senders = 10
wal_keep_size = '2GB'
hot_standby = on

# ── Statistics / extensions ────────────────────────────────────────────
shared_preload_libraries = 'vector,pg_stat_statements'   # pgvector + query stats
track_io_timing = on
track_activities = on
track_counts = on
track_functions = pl

# ── Locale / format ─────────────────────────────────────────────────────
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'