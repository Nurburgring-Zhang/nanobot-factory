# ============================================================================
# prometheus.yml — IMDF Prometheus scrape config
# ----------------------------------------------------------------------------
# Discovers: 12 imdf services + gateway + 2 celery + node-exporter + MinIO.
# Stores 30 days of 15s-resolution data (~80 GB on a single host).
# ============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: imdf-bare-metal
    env: production

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

scrape_configs:
  # ── Prometheus self ──────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']
        labels: { tier: observability }

  # ── Node exporter (host metrics) ────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['127.0.0.1:9100']
        labels: { tier: host }

  # ── imdf api-gateway ────────────────────────────────────────────────
  - job_name: imdf-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8000']
        labels: { service: imdf-gateway, tier: edge }

  # ── 12 microservices ────────────────────────────────────────────────
  - job_name: imdf-user
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8001']
        labels: { service: imdf-user }
  - job_name: imdf-asset
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8002']
        labels: { service: imdf-asset }
  - job_name: imdf-annotation
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8003']
        labels: { service: imdf-annotation }
  - job_name: imdf-cleaning
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8004']
        labels: { service: imdf-cleaning }
  - job_name: imdf-scoring
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8005']
        labels: { service: imdf-scoring }
  - job_name: imdf-dataset
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8006']
        labels: { service: imdf-dataset }
  - job_name: imdf-evaluation
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8007']
        labels: { service: imdf-evaluation }
  - job_name: imdf-agent
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8008']
        labels: { service: imdf-agent }
  - job_name: imdf-workflow
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8009']
        labels: { service: imdf-workflow }
  - job_name: imdf-notification
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8010']
        labels: { service: imdf-notification }
  - job_name: imdf-search
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8011']
        labels: { service: imdf-search }
  - job_name: imdf-collection
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8012']
        labels: { service: imdf-collection }

  # ── Celery worker + beat (Flower-equivalent metrics) ────────────────
  - job_name: imdf-celery
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:9801']
        labels: { service: imdf-celery }

  # ── PostgreSQL exporter ─────────────────────────────────────────────
  - job_name: postgres-exporter
    static_configs:
      - targets: ['127.0.0.1:9187']

  # ── Redis exporter ──────────────────────────────────────────────────
  - job_name: redis-exporter
    static_configs:
      - targets: ['127.0.0.1:9121']

  # ── MinIO ───────────────────────────────────────────────────────────
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['127.0.0.1:9000']

  # ── Nginx stub_status (via nginx-prometheus-exporter) ──────────────
  - job_name: nginx
    static_configs:
      - targets: ['127.0.0.1:9113']

  # ── Alertmanager self ──────────────────────────────────────────────
  - job_name: alertmanager
    static_configs:
      - targets: ['127.0.0.1:9093']

storage:
  tsdb:
    path: /var/lib/prometheus
    retention.time: 30d
    retention.size: 80GB
    wal-compression: true