{{- /* Renders the 12 microservice deployments via the _microservice.tpl helper. */ -}}
{{- $ctx := . -}}
{{- if eq (int $ctx.Values.services.user.port) 8001 }}
{{- include "nanobot-factory.microservice" (dict "ctx" $ctx "name" "user-service" "module" "backend.services.user_service.main" "port" 8001 "heavy" false) }}
{{- end }}
