{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: nanobot-factory
  labels:
    {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "postgres") | nindent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: nanobot-factory
  labels:
    {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "postgres") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
  {{- if .Values.postgres.storageClassName }}
  storageClassName: {{ .Values.postgres.storageClassName }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nanobot-factory
  labels:
    {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
      protocol: TCP
  selector:
    {{- include "nanobot-factory.selectorLabels" (dict "ctx" . "name" "postgres") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nanobot-factory
  labels:
    {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "postgres") | nindent 4 }}
spec:
  serviceName: postgres
  replicas: {{ .Values.replicas.postgres }}
  selector:
    matchLabels:
      {{- include "nanobot-factory.selectorLabels" (dict "ctx" . "name" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "postgres") | nindent 8 }}
    spec:
      serviceAccountName: postgres
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.port }}
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nanobot-factory.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
        {{- if .Values.postgres.storageClassName }}
        storageClassName: {{ .Values.postgres.storageClassName }}
        {{- end }}
{{- end }}