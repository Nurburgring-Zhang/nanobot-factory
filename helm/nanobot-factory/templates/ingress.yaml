{{- if .Values.ingress.enabled -}}
{{- range $h := .Values.ingress.hosts }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nanobot-factory-{{ $h.host }}
  namespace: nanobot-factory
  annotations:
    {{- range $k, $v := $.Values.ingress.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  {{- if $.Values.ingress.tls }}
  tls:
    {{- range $.Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  {{- if not (has $h.host (concat ($.Values.ingress.tls | default list | first).hosts)) }}
  {{- end }}
  rules:
    - host: {{ $h.host | quote }}
      http:
        paths:
          {{- range $h.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .service }}
                port:
                  number: {{ .port }}
          {{- end }}
{{- end }}
{{- end }}