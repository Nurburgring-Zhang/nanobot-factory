{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: nanobot-factory
  labels:
    {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "redis") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nanobot-factory
  labels:
    {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    {{- include "nanobot-factory.selectorLabels" (dict "ctx" . "name" "redis") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nanobot-factory
  labels:
    {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "redis") | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.redis }}
  selector:
    matchLabels:
      {{- include "nanobot-factory.selectorLabels" (dict "ctx" . "name" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nanobot-factory.commonLabels" (dict "ctx" . "name" "redis") | nindent 8 }}
    spec:
      serviceAccountName: redis
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - {{ .Values.redis.maxmemory | quote }}
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
{{- end }}