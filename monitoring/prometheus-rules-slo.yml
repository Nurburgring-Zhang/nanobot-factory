groups:
- name: p19_e3_slo_burn_rate
  interval: 30s
  rules:
  - alert: api_availability_99_9_FastBurn
    expr: "(\n  (sum(rate(http_requests_total{status!=\"ok\"}[5m])) / clamp_min(sum(rate(http_requests_total{service=~\"\
      .+\"}[5m])), 0.001))\n  / (1 - 0.999)\n) > 14.4\nand\n(\n  (sum(rate(http_requests_total{status!=\"\
      ok\"}[1h])) / clamp_min(sum(rate(http_requests_total{service=~\".+\"}[1h])),\
      \ 0.001))\n  / (1 - 0.999)\n) > 6.0"
    for: 2m
    labels:
      severity: critical
      slo: api_availability_99_9
      service: api
      tier: edge
    annotations:
      summary: 'api_availability_99_9: critical FastBurn — 14.4× burn over 5m AND
        6.0× burn over 1h'
      description: 'SLO api_availability_99_9 (target=0.9990) is burning budget at
        14.4× short window / 6.0× long window. Page on-call: investigate api availability.'
      slo_target: '0.999'
      window_seconds: '2592000'
      runbook_url: https://wiki.imdf.example.com/runbook/slo/api_availability_99_9
  - alert: api_availability_99_9_SlowBurn
    expr: "(\n  (sum(rate(http_requests_total{status!=\"ok\"}[30m])) / clamp_min(sum(rate(http_requests_total{service=~\"\
      .+\"}[30m])), 0.001))\n  / (1 - 0.999)\n) > 6.0\nand\n(\n  (sum(rate(http_requests_total{status!=\"\
      ok\"}[6h])) / clamp_min(sum(rate(http_requests_total{service=~\".+\"}[6h])),\
      \ 0.001))\n  / (1 - 0.999)\n) > 3.0"
    for: 5m
    labels:
      severity: warning
      slo: api_availability_99_9
      service: api
      tier: edge
    annotations:
      summary: 'api_availability_99_9: warning SlowBurn — 6.0× burn over 30m AND 3.0×
        burn over 6h'
      description: 'SLO api_availability_99_9 (target=0.9990) is burning budget at
        6.0× short window / 3.0× long window. Page on-call: investigate api availability.'
      slo_target: '0.999'
      window_seconds: '2592000'
      runbook_url: https://wiki.imdf.example.com/runbook/slo/api_availability_99_9
  - alert: api_availability_99_9_VerySlowBurn
    expr: "(\n  (sum(rate(http_requests_total{status!=\"ok\"}[2h])) / clamp_min(sum(rate(http_requests_total{service=~\"\
      .+\"}[2h])), 0.001))\n  / (1 - 0.999)\n) > 3.0\nand\n(\n  (sum(rate(http_requests_total{status!=\"\
      ok\"}[24h])) / clamp_min(sum(rate(http_requests_total{service=~\".+\"}[24h])),\
      \ 0.001))\n  / (1 - 0.999)\n) > 1.0"
    for: 30m
    labels:
      severity: info
      slo: api_availability_99_9
      service: api
      tier: edge
    annotations:
      summary: 'api_availability_99_9: info VerySlowBurn — 3.0× burn over 2h AND 1.0×
        burn over 24h'
      description: 'SLO api_availability_99_9 (target=0.9990) is burning budget at
        3.0× short window / 1.0× long window. Page on-call: investigate api availability.'
      slo_target: '0.999'
      window_seconds: '2592000'
      runbook_url: https://wiki.imdf.example.com/runbook/slo/api_availability_99_9
  - alert: backend_p99_latency_300ms_FastBurn
    expr: "(\n  (\n    1\n    -\n    sum(rate(http_request_duration_seconds_bucket{le=\"\
      0.3\"}[5m]))\n    / clamp_min(sum(rate(http_request_duration_seconds_count{}[5m])),\
      \ 0.001)\n  )\n  / (1 - 0.99)\n) > 14.4\nand\n(\n  (\n    1\n    -\n    sum(rate(http_request_duration_seconds_bucket{le=\"\
      0.3\"}[1h]))\n    / clamp_min(sum(rate(http_request_duration_seconds_count{}[1h])),\
      \ 0.001)\n  )\n  / (1 - 0.99)\n) > 6.0"
    for: 2m
    labels:
      severity: critical
      slo: backend_p99_latency_300ms
      service: backend
      tier: compute
    annotations:
      summary: 'backend_p99_latency_300ms: critical FastBurn — 14.4× burn over 5m
        AND 6.0× burn over 1h'
      description: 'SLO backend_p99_latency_300ms (target=0.9900) is burning budget
