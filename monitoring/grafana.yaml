# =============================================================================
# P3-8-W2: Grafana Deployment + Service + ConfigMap (datasource + dashboards)
# =============================================================================
# Datasource: Prometheus (cluster-local) + Jaeger (tracing) + Loki (logs).
# Dashboards auto-provisioned from /var/lib/grafana/dashboards/.
# Admin password from env GRAFANA_ADMIN_PASSWORD (default: changeme-in-prod).
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 15s
          httpMethod: POST
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger-query.monitoring.svc.cluster.local:16686
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-providers
  namespace: monitoring
  labels:
    app: grafana
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: nanobot-factory-dashboards
        orgId: 1
        folder: nanobot-factory
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-overview
  namespace: monitoring
  labels:
    app: grafana
    grafana_dashboard: "1"
data:
  overview.json: |
    {
      "title": "nanobot-factory Overview",
      "uid": "imdf-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "tags": ["imdf", "overview"],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "QPS (total)",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {"expr": "sum(rate(imdf_requests_total[1m]))", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "P99 Latency (s)",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [
            {"expr": "histogram_quantile(0.99, sum(rate(imdf_request_latency_seconds_bucket[5m])) by (le))", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "decimals": 3}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Error Rate (%)",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [
            {"expr": "sum(rate(imdf_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(imdf_requests_total[5m]))", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit"}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Active Connections",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [
            {"expr": "sum(imdf_active_connections)", "refId": "A"}
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Request rate by microservice",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {"expr": "sum by (microservice) (rate(imdf_requests_total[1m]))", "legendFormat": "{{microservice}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "P95 latency by microservice",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by (le, microservice) (rate(imdf_request_latency_seconds_bucket[5m])))", "legendFormat": "{{microservice}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Memory RSS by microservice",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {"expr": "sum by (microservice) (imdf_memory_rss_bytes)", "legendFormat": "{{microservice}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Queue depth & running tasks",
          "datasource": {"type": "prometheus", "uid": "Prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {"expr": "sum(imdf_queue_depth)", "legendFormat": "queue_depth", "refId": "A"},
            {"expr": "sum(imdf_running_tasks)", "legendFormat": "running_tasks", "refId": "B"}
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: password
                  optional: true
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "traceql"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: storage
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: providers
          configMap:
            name: grafana-dashboards-providers
        - name: dashboards
          configMap:
            name: grafana-dashboard-overview
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app: grafana
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  # default password; override in production via sealed-secret or external secret
  password: "changeme-in-prod-rotate-me"
