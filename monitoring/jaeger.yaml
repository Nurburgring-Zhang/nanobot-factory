# =============================================================================
# P3-8-W2: Jaeger all-in-one Deployment + Service (distributed tracing)
# =============================================================================
# Jaeger all-in-one: agent + collector + query + storage (in-memory).
# Receives OTLP gRPC on port 4317 (compatible with prometheus otlp_receiver).
# For production, swap the storage backend to Elasticsearch or Cassandra.
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.57
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: COLLECTOR_ZIPKIN_HOST_PORT
              value: ":9411"
            # in-memory storage; for prod switch to ES/Cassandra
            - name: SPAN_STORAGE_TYPE
              value: "memory"
            - name: METRICS_BACKEND
              value: "prometheus"
            - name: PROMETHEUS_SERVER_URL
              value: "http://prometheus.monitoring.svc.cluster.local:9090"
            - name: JAEGER_SAMPLER_TYPE
              value: "probabilistic"
            - name: JAEGER_SAMPLER_PARAM
              value: "0.1"
            - name: JAEGER_REPORTER_LOG_SPANS
              value: "true"
            # query UI allowed hosts (CORS)
            - name: QUERY_BASE_PATH
              value: "/jaeger"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: jaeger-query
              containerPort: 16686
              protocol: TCP
            - name: jaeger-collector
              containerPort: 14250
              protocol: TCP
            - name: zipkin
              containerPort: 9411
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: jaeger-query
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: jaeger-query
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: query
      port: 16686
      targetPort: jaeger-query
    - name: collector
      port: 14250
      targetPort: jaeger-collector
    - name: zipkin
      port: 9411
      targetPort: zipkin
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: monitoring
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
    - name: query
      port: 16686
      targetPort: jaeger-query
  selector:
    app: jaeger
