[pytest]
testpaths = tests
timeout = 30
pythonpath = backend/imdf
norecursedirs = .git __pycache__ .pytest_cache node_modules venv .venv
addopts = -v --tb=short --color=yes --strict-markers -p no:django
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    dedup: deduplication tests
    iaa: inter-annotator agreement tests
    classification: classification tests
    auth: authentication tests
    data_flow: data flow tests
    api_chain: API chain tests
    full_workflow: full workflow tests
    e2e_playwright: Playwright 浏览器层 E2E 测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
