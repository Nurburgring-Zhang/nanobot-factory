<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#2080f0" />
    <title>nanobot-factory 智影 (ZhiYing)</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f7fa;
      }
      #app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        flex-direction: column;
        gap: 12px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(32, 128, 240, 0.18);
        border-top-color: #2080f0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        color: #888;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">
        <div class="spinner"></div>
        <div class="loading-text">智影 · nanobot-factory</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
