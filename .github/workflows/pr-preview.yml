# =====================================================================
# PR preview — auto-deploy every PR to a unique preview URL
# Uses Cloudflare Tunnel or shared ingress with hostname templating.
# Cleanup: deletes the preview namespace when the PR closes.
# =====================================================================
name: pr-preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write
  packages: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -----------------------------------------------------------------
  # 1. On PR open / update → deploy a preview
  # -----------------------------------------------------------------
  preview:
    if: github.event.action != 'closed'
    name: Deploy preview
    runs-on: ubuntu-latest
    environment:
      name: pr-preview
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive preview slug
        id: slug
        run: |
          SLUG="pr-${{ github.event.pull_request.number }}"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "preview_url=https://${SLUG}.preview.nanobot.example.com" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Setup kubeconform
        run: |
          curl -sSLO https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Configure kubectl (preview cluster)
        run: |
          echo "${{ secrets.PREVIEW_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Create preview namespace
        run: |
          NS=${{ steps.slug.outputs.slug }}
          kubectl create namespace "${NS}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "${NS}" purpose=pr-preview --overwrite

      - name: Render preview manifest
        id: render
        working-directory: deploy/helm/nanobot-factory
        run: |
          SLUG=${{ steps.slug.outputs.slug }}
          helm template nanobot-factory . \
              --namespace "${SLUG}" \
              --set namespace.name="${SLUG}" \
              --set namespace.create=false \
              --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
              --set image.tag=pr-${{ github.event.pull_request.number }} \
              --set replicaCount=1 \
              --set autoscaling.enabled=false \
              --set persistence.data.enabled=false \
              --set persistence.logs.enabled=false \
              --set ingress.hosts[0].host=${SLUG}.preview.nanobot.example.com \
              --set ingress.hosts[0].paths[0].path=/ \
              --set ingress.hosts[0].paths[0].pathType=Prefix \
              --set ingress.tls[0].hosts[0]=${SLUG}.preview.nanobot.example.com \
              --set ingress.tls[0].secretName=${SLUG}-tls \
              --set config.allowedOrigins="https://${SLUG}.preview.nanobot.example.com" \
              --set config.logLevel=DEBUG \
              > /tmp/preview.yaml
          wc -l /tmp/preview.yaml

      - name: kubeconform
        run: kubeconform -strict -summary /tmp/preview.yaml

      - name: Apply preview
        run: kubectl apply -f /tmp/preview.yaml

      - name: Wait for rollout
        run: |
          NS=${{ steps.slug.outputs.slug }}
          kubectl -n "${NS}" rollout status deploy/nanobot-factory --timeout=5m

      - name: Smoke test
        run: |
          NS=${{ steps.slug.outputs.slug }}
          kubectl -n "${NS}" port-forward svc/nanobot-factory 8080:80 &
          PF=$!
          sleep 5
          curl -fsS http://localhost:8080/healthz
          kill $PF || true

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            🚀 Preview deployed!

            URL: https://${{ steps.slug.outputs.slug }}.preview.nanobot.example.com
            Namespace: ${{ steps.slug.outputs.slug }}
            Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
            Auto-cleanup: when this PR is closed.

      - name: Deploy
        id: deploy
        run: echo "preview_url=https://${{ steps.slug.outputs.slug }}.preview.nanobot.example.com" >> "$GITHUB_OUTPUT"

  # -----------------------------------------------------------------
  # 2. On PR close → cleanup
  # -----------------------------------------------------------------
  cleanup:
    if: github.event.action == 'closed'
    name: Cleanup preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl (preview cluster)
        run: |
          echo "${{ secrets.PREVIEW_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Delete preview namespace
        run: |
          NS="pr-${{ github.event.pull_request.number }}"
          kubectl delete namespace "${NS}" --ignore-not-found
          echo "Deleted namespace ${NS}"