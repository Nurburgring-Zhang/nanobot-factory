# =====================================================================
# Security — OWASP A06 (依赖扫描) + A08 (审计链) checks
# Triggers: PR / push to main / weekly schedule
# =====================================================================
name: security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每周一 06:00 UTC 跑全量扫描, 配合 dependabot.yml 提 PR
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

# Don't cancel — security scans should always finish so we can review the report
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  # -----------------------------------------------------------------
  # 1. pip-audit — PyPI advisory DB
  # -----------------------------------------------------------------
  pip-audit:
    name: pip-audit (PyPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.6.1

      - name: Scan requirements_full.txt
        run: |
          pip-audit \
            -r requirements_full.txt \
            --format json \
            --output reports/owasp_a06_pip_audit.json \
            --strict || true

      - name: Scan requirements.txt (P2-1-W2 slim)
        run: |
          pip-audit \
            -r requirements.txt \
            --format json \
            --output reports/owasp_a06_pip_audit_slim.json \
            --strict || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-a06-pip-audit
          path: reports/owasp_a06_pip_audit*.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## pip-audit summary" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/owasp_a06_pip_audit.json ]; then
            python -c "
import json
d = json.load(open('reports/owasp_a06_pip_audit.json'))
deps = d.get('dependencies', [])
vulns = sum(len(x.get('vulns', [])) for x in deps)
print(f'**Scanned**: {len(deps)} deps, **Vulnerabilities**: {vulns}')
for dep in deps:
    for v in dep.get('vulns', []):
        print(f\"- \`{dep['name']}@{dep['version']}\` → {v['id']} ({v.get('severity', '?')})\")
" >> $GITHUB_STEP_SUMMARY
          fi

  # -----------------------------------------------------------------
  # 2. safety — Safety DB (commercial-grade)
  # -----------------------------------------------------------------
  safety:
    name: safety (Safety DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install safety
        run: pip install safety==2.3.5

      - name: Scan requirements_full.txt
        run: |
          safety check \
            -r requirements_full.txt \
            --json \
            --output reports/owasp_a06_safety.json || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-a06-safety
          path: reports/owasp_a06_safety.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## safety summary" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/owasp_a06_safety.json ]; then
            python -c "
import json
d = json.load(open('reports/owasp_a06_safety.json'))
vulns = d.get('vulnerabilities', [])
print(f'**Vulnerabilities**: {len(vulns)}')
for v in vulns[:20]:
    pkg = v.get('package_name', '?')
    ver = v.get('analyzed_version', '?')
    adv = v.get('advisory', '')
    cve = v.get('CVE', v.get('vulnerability_id', '?'))
    sev = v.get('severity', '?')
    print(f'- \`{pkg}@{ver}\` → {cve} ({sev})')
" >> $GITHUB_STEP_SUMMARY
          fi

  # -----------------------------------------------------------------
  # 3. Combined report (single artifact for human review)
  # -----------------------------------------------------------------
  combine:
    name: Combined OWASP report
    runs-on: ubuntu-latest
    needs: [pip-audit, safety]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: owasp-a06-*
          path: artifacts/

      - name: Build combined report
        run: |
          python - <<'PY'
import json, glob, os
from datetime import datetime, timezone

out = {
    "generated_at": datetime.now(timezone.utc).isoformat(),
    "scanners": [],
    "total_vulnerabilities": 0,
    "by_severity": {},
}

for path in sorted(glob.glob("artifacts/**/*.json", recursive=True)):
    try:
        d = json.load(open(path, encoding="utf-8"))
    except Exception as e:
        print(f"skip {path}: {e}")
        continue

    scanner = os.path.basename(path)
    vulns = []
    if "dependencies" in d:
        # pip-audit shape
        for dep in d["dependencies"]:
            for v in dep.get("vulns", []):
                vulns.append({
                    "package": dep["name"],
                    "version": dep["version"],
                    "id": v.get("id", ""),
                    "severity": (v.get("severity") or "UNKNOWN").upper(),
                    "fix_versions": v.get("fix_versions", []),
                    "description": v.get("description", "")[:500],
                })
    elif "vulnerabilities" in d:
        # safety shape
        for v in d["vulnerabilities"]:
            vulns.append({
                "package": v.get("package_name", "?"),
                "version": v.get("analyzed_version", "?"),
                "id": v.get("CVE") or v.get("vulnerability_id") or "?",
                "severity": (v.get("severity") or "UNKNOWN").upper(),
                "fix_versions": [],
                "description": v.get("advisory", "")[:500],
            })
    out["scanners"].append({"name": scanner, "vulnerabilities": vulns})
    out["total_vulnerabilities"] += len(vulns)
    for v in vulns:
        sev = v.get("severity", "UNKNOWN")
        out["by_severity"][sev] = out["by_severity"].get(sev, 0) + 1

os.makedirs("reports", exist_ok=True)
with open("reports/owasp_a06.json", "w", encoding="utf-8") as f:
    json.dump(out, f, ensure_ascii=False, indent=2)

print(f"combined: {out['total_vulnerabilities']} vulnerabilities")
print(f"by severity: {out['by_severity']}")
PY

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-a06-combined
          path: reports/owasp_a06.json
          retention-days: 90

  # -----------------------------------------------------------------
  # 4. CI success gate
  # -----------------------------------------------------------------
  security-success:
    name: Security status
    runs-on: ubuntu-latest
    needs: [pip-audit, safety]
    if: always()
    steps:
      - name: Report
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::One or more security jobs failed"
            exit 1
          fi
          echo "All security jobs finished (vulnerabilities reported as artifacts) ✓"
          echo "::notice::Review the combined report in the workflow artifacts."