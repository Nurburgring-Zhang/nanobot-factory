# =====================================================================
# Dependabot — weekly dependency updates for npm + pip + GitHub Actions
# + docker base images + helm chart (where applicable).
# =====================================================================
version: 2

updates:
  # ------------------ Node / npm ------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
      - "npm"
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      vite:
        patterns:
          - "vite*"
          - "@vitejs/*"
      electron:
        patterns:
          - "electron*"
          - "electron-*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(npm)"
    # Don't bump major versions of these on autopilot
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
      - dependency-name: "three"
      - dependency-name: "@react-three/*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"

  # ------------------ Python / pip ------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "04:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(pip)"
    groups:
      fastapi:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "starlette"
      testing:
        patterns:
          - "pytest*"
          - "httpx"

  # ------------------ GitHub Actions ------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
    groups:
      actions:
        patterns:
          - "actions/*"
          - "docker/*"
          - "azure/*"
          - "aquasecurity/*"
          - "github/*"

  # ------------------ Docker base images ------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "04:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    target-branch: "develop"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
    ignore:
      # Major version jumps for the runtime images — review manually
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
      - dependency-name: "nginx"
        update-types: ["version-update:semver-major"]