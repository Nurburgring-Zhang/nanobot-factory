# =============================================================================
# Routing Strategies
# =============================================================================

routing:
  # Default routing strategy
  default: "quality_optimized"

  # Strategy configurations
  strategies:
    quality_optimized:
      name: "Quality Optimized"
      description: "Select the highest quality model for the task"
      priority: ["quality_score"]

    cost_optimized:
      name: "Cost Optimized"
      description: "Minimize cost while maintaining acceptable quality"
      priority: ["cost_tier", "quality_score"]

    latency_optimized:
      name: "Latency Optimized"
      description: "Minimize response time"
      priority: ["latency_tier", "quality_score"]

    balanced:
      name: "Balanced"
      description: "Balance quality, cost, and latency"
      priority: ["quality_score", "latency_tier", "cost_tier"]

# =============================================================================
# Shadow Deployment (A/B Testing)
# =============================================================================

shadow_deployment:
  enabled: true
  traffic_split: 10  # Percentage of traffic to shadow model
  models:
    - model: "gpt-5"
      shadow: "claude-4-sonnet"
    - model: "gemini-2-0-pro"
      shadow: "gemini-2-0-flash"

# =============================================================================
# Hot-Reload Settings
# =============================================================================

hot_reload:
  enabled: true
  watch_file: "models.yaml"
  reload_interval: 5  # seconds
  auto_retry_failed_requests: true
  max_retries: 3
