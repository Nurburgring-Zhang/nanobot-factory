# =====================================================================
# agent-service (port 8008) - P3-3-W1
# =====================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-service
  namespace: nanobot-factory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: nanobot-factory
  labels:
    app: agent-service
    app.kubernetes.io/component: microservice
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
        app.kubernetes.io/component: microservice
    spec:
      serviceAccountName: agent-service
      containers:
        - name: agent-service
          image: ghcr.io/minimax-ai/nanobot-factory:v0.8.0
          imagePullPolicy: IfNotPresent
          command:
            - /opt/venv/bin/uvicorn
            - backend.services.agent_service.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8008"
            - --log-level
            - info
          ports:
            - name: http
              containerPort: 8008
              protocol: TCP
          env:
            - name: NANOBOT_PORT
              value: "8008"
            - name: AGENT_SERVICE_URL
              value: http://agent-service.nanobot-factory.svc.cluster.local:8008
          envFrom:
            - configMapRef:
                name: nanobot-config
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1.5"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8008
            initialDelaySeconds: 25
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: nanobot-factory
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8008
      targetPort: 8008
      protocol: TCP
  selector:
    app: agent-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-service
  namespace: nanobot-factory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300