# =====================================================================
# asset-service (port 8002) - P3-2-W1
# =====================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: asset-service
  namespace: nanobot-factory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-service
  namespace: nanobot-factory
  labels:
    app: asset-service
    app.kubernetes.io/component: microservice
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: asset-service
  template:
    metadata:
      labels:
        app: asset-service
        app.kubernetes.io/component: microservice
    spec:
      serviceAccountName: asset-service
      containers:
        - name: asset-service
          image: ghcr.io/minimax-ai/nanobot-factory:v0.8.0
          imagePullPolicy: IfNotPresent
          command:
            - /opt/venv/bin/uvicorn
            - backend.services.asset_service.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8002"
            - --log-level
            - info
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          env:
            - name: NANOBOT_PORT
              value: "8002"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nanobot-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nanobot-secrets
                  key: S3_SECRET_KEY
          envFrom:
            - configMapRef:
                name: nanobot-config
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: asset-service
  namespace: nanobot-factory
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      protocol: TCP
  selector:
    app: asset-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asset-service
  namespace: nanobot-factory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asset-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300