# =====================================================================
# scoring-service (port 8005) - P3-2-W2
# =====================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: scoring-service
  namespace: nanobot-factory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scoring-service
  namespace: nanobot-factory
  labels:
    app: scoring-service
    app.kubernetes.io/component: microservice
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: scoring-service
  template:
    metadata:
      labels:
        app: scoring-service
        app.kubernetes.io/component: microservice
    spec:
      serviceAccountName: scoring-service
      containers:
        - name: scoring-service
          image: ghcr.io/minimax-ai/nanobot-factory:v0.8.0
          imagePullPolicy: IfNotPresent
          command:
            - /opt/venv/bin/uvicorn
            - backend.services.scoring_service.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8005"
            - --log-level
            - info
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
          env:
            - name: NANOBOT_PORT
              value: "8005"
          envFrom:
            - configMapRef:
                name: nanobot-config
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1.5"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8005
            initialDelaySeconds: 25
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: scoring-service
  namespace: nanobot-factory
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8005
      targetPort: 8005
      protocol: TCP
  selector:
    app: scoring-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scoring-service
  namespace: nanobot-factory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scoring-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300