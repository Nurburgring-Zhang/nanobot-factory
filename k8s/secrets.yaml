# =====================================================================
# Nanobot Factory - Secrets (encrypted credentials)
# =====================================================================
# Sensitive values that must NOT live in ConfigMap.  In production this
# should be replaced by External Secrets / Sealed Secrets / Vault.
#
# Base64-encoded values (decode BEFORE committing):
#   POSTGRES_PASSWORD  -> change to a strong 32+ char password
#   JWT_SECRET         -> `openssl rand -hex 64`
#   MINIO_ROOT_USER    -> strong username
#   MINIO_ROOT_PASSWORD -> strong 32+ char password
#   S3_ACCESS_KEY / S3_SECRET_KEY -> service-account keys (NOT root)
#   SMTP_PASSWORD      -> SMTP relay password (only if enabled)
#
# Re-encode with:
#   echo -n 'value' | base64
# =====================================================================

apiVersion: v1
kind: Secret
metadata:
  name: nanobot-secrets
  namespace: nanobot-factory
  labels:
    app.kubernetes.io/part-of: nanobot-factory
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Override at install time with --from-literal= or sealed-secret:
  POSTGRES_PASSWORD: "CHANGE_ME_postgres_strong_password_32chars_min"
  JWT_SECRET: "CHANGE_ME_jwt_signing_secret_use_openssl_rand_hex_64"
  JWT_REFRESH_SECRET: "CHANGE_ME_jwt_refresh_secret_separate_from_jwt"
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_minio_root_password_32chars_min"
  S3_ACCESS_KEY: "CHANGE_ME_s3_service_access_key"
  S3_SECRET_KEY: "CHANGE_ME_s3_service_secret_key"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "notifications@nanobot-factory.com"
  SMTP_PASSWORD: "CHANGE_ME_smtp_relay_password"
  ENCRYPTION_KEY: "CHANGE_ME_fernet_44char_urlsafe_base64"
  CSRF_SECRET: "CHANGE_ME_csrf_signing_secret"
  ADMIN_BOOTSTRAP_TOKEN: "CHANGE_ME_one_time_admin_bootstrap_token"
---
# Convenience Secret: Postgres credentials only (mounted by postgres pod itself)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: nanobot-factory
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME_postgres_strong_password_32chars_min"
  POSTGRES_DB: "imdf"
---
# Convenience Secret: MinIO credentials only (mounted by minio pod)
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: nanobot-factory
type: Opaque
stringData:
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_minio_root_password_32chars_min"