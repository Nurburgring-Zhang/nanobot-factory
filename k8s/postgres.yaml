# =====================================================================
# Nanobot Factory - PostgreSQL + pgvector (StatefulSet)
# =====================================================================
# Production-grade postgres with pgvector extension for semantic search.
# 10GB PVC (expandable).  Single replica (HA out of scope for this task).
# =====================================================================

# ---------- Service (headless + read-write) ----------
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nanobot-factory
  labels:
    app: postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgres
---
# ---------- PersistentVolumeClaim ----------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: nanobot-factory
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
# ---------- StatefulSet ----------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nanobot-factory
  labels:
    app: postgres
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: postgres-credentials
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "imdf"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "imdf"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-scripts
          configMap:
            name: postgres-init
            optional: true
---
# ---------- ServiceAccount ----------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: nanobot-factory
---
# ---------- Init script ConfigMap: enable pgvector extension ----------
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: nanobot-factory
data:
  01-pgvector.sql: |
    -- Enable pgvector extension (idempotent)
    CREATE EXTENSION IF NOT EXISTS vector;
    -- Useful indexes
    CREATE INDEX IF NOT EXISTS idx_asset_embedding_hnsw
        ON asset_embedding USING hnsw (embedding vector_cosine_ops);
    CREATE INDEX IF NOT EXISTS idx_workflow_node_lookup
        ON workflow_node (workflow_id, position);